name: Build AkademiTrack
on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Don't cancel other jobs if one fails
      matrix:
        include:
          - os: windows-latest
            icon: pictures/logo.ico
            build-cmd: |
              nuitka --standalone --windows-console-mode=disable --enable-plugin=pyqt5 --include-data-dir=pictures=pictures --output-filename=AkademiTrack --output-dir=. --windows-icon-from-ico=pictures/logo.ico --assume-yes-for-downloads main.py
          - os: macos-latest
            icon: pictures/logo.icns
            build-cmd: |
              nuitka --standalone --macos-app-mode=gui --enable-plugin=pyqt5 --include-data-dir=pictures=pictures --output-filename=AkademiTrack --output-dir=. --macos-app-icon=pictures/logo.icns --assume-yes-for-downloads main.py
          - os: ubuntu-latest
            icon: pictures/logo.png
            build-cmd: |
              nuitka --standalone --enable-plugin=pyqt5 --include-data-dir=pictures=pictures --output-filename=AkademiTrack --output-dir=. --linux-icon=pictures/logo.png --assume-yes-for-downloads main.py

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-pyqt5 python3-pyqt5.qtcore python3-pyqt5.qtgui python3-pyqt5.qtwidgets

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka pyqt5
          pip install -r requirements.txt || echo "No requirements.txt found"

      - name: List files for debugging
        run: |
          echo 'Current directory contents:'
          ls -la
          echo 'Pictures directory contents:'
          ls -la pictures/
          echo 'Python files:'
          ls -la *.py

      - name: Build application
        run: |
          echo "Building with command: ${{ matrix.build-cmd }}"
          ${{ matrix.build-cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AkademiTrack-${{ matrix.os }}
          path: |
            AkademiTrack*
            *.app
          if-no-files-found: error
