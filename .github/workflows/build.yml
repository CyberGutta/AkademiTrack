name: Build AkademiTrack
on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            icon: pictures/logo.ico
          - os: macos-latest
            icon: pictures/logo.icns
          - os: ubuntu-latest
            icon: pictures/logo.png

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-pyqt5 libqt5core5a libqt5gui5 libqt5widgets5

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install python@3.11 || true
          brew install qt@5 || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install nuitka pyqt5 requests selenium webdriver-manager schedule psutil browser-cookie3

      - name: Verify files exist
        run: |
          echo "Verifying project files..."
          ls -la
          echo "Python files:"
          ls -la *.py || echo "No Python files found"
          echo "Pictures directory:"
          ls -la pictures/ || echo "No pictures directory found"
          echo "Icon file for this OS: ${{ matrix.icon }}"
          ls -la ${{ matrix.icon }} || echo "Icon file not found"

      - name: Test Python imports
        run: |
          echo "Testing Python imports..."
          python -c "import sys; print(f'Python version: {sys.version}')"
          python -c "import PyQt5; print('PyQt5 OK')"
          python -c "import backend; print('backend.py OK')" || echo "WARNING: backend.py import failed"
          python -c "import gui; print('gui.py OK')" || echo "WARNING: gui.py import failed"
          python -c "import main; print('main.py OK')" || echo "WARNING: main.py import failed"

      - name: Create dist directory
        run: mkdir -p dist

      - name: Build Windows application
        if: matrix.os == 'windows-latest'
        run: |
          echo "Building Windows application..."
          python -m nuitka \
            --standalone \
            --windows-console-mode=disable \
            --enable-plugin=pyqt5 \
            --include-data-dir=pictures=pictures \
            --output-filename=AkademiTrack \
            --output-dir=dist \
            --windows-icon-from-ico=pictures/logo.ico \
            --assume-yes-for-downloads \
            --follow-imports \
            --nofollow-import-to=tkinter \
            main.py
        shell: bash

      - name: Build macOS application
        if: matrix.os == 'macos-latest'
        run: |
          echo "Building macOS application..."
          python -m nuitka \
            --mode=app \
            --enable-plugin=pyqt5 \
            --include-data-dir=pictures=pictures \
            --output-filename=AkademiTrack \
            --output-dir=dist \
            --macos-app-icon=pictures/logo.icns \
            --assume-yes-for-downloads \
            --follow-imports \
            --nofollow-import-to=tkinter \
            --macos-create-app-bundle \
            --macos-target-arch=arm64 \
            main.py
        shell: bash

      - name: Build Linux application
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Building Linux application..."
          python -m nuitka \
            --standalone \
            --enable-plugin=pyqt5 \
            --include-data-dir=pictures=pictures \
            --output-filename=AkademiTrack \
            --output-dir=dist \
            --linux-icon=pictures/logo.png \
            --assume-yes-for-downloads \
            --follow-imports \
            --nofollow-import-to=tkinter \
            main.py
        shell: bash

      - name: Fix macOS app structure and permissions
        if: matrix.os == 'macos-latest'
        run: |
          # Find the app bundle
          APP_PATH=""
          if [ -d "dist/AkademiTrack.app" ]; then
            APP_PATH="dist/AkademiTrack.app"
          elif [ -d "AkademiTrack.app" ]; then
            mkdir -p dist
            mv AkademiTrack.app dist/
            APP_PATH="dist/AkademiTrack.app"
          elif [ -d "dist/main.app" ]; then
            mv dist/main.app dist/AkademiTrack.app
            APP_PATH="dist/AkademiTrack.app"
          elif [ -d "main.app" ]; then
            mkdir -p dist
            mv main.app dist/AkademiTrack.app
            APP_PATH="dist/AkademiTrack.app"
          fi

          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "Working with app bundle: $APP_PATH"
            
            # Ensure proper app structure
            mkdir -p "$APP_PATH/Contents/MacOS"
            mkdir -p "$APP_PATH/Contents/Resources"
            
            # Find the main executable
            MAIN_EXEC=""
            if [ -f "$APP_PATH/Contents/MacOS/AkademiTrack" ]; then
              MAIN_EXEC="$APP_PATH/Contents/MacOS/AkademiTrack"
            elif [ -f "$APP_PATH/Contents/MacOS/main" ]; then
              mv "$APP_PATH/Contents/MacOS/main" "$APP_PATH/Contents/MacOS/AkademiTrack"
              MAIN_EXEC="$APP_PATH/Contents/MacOS/AkademiTrack"
            else
              # Look for any executable in MacOS
              for file in "$APP_PATH/Contents/MacOS"/*; do
                if [ -x "$file" ] && [ -f "$file" ]; then
                  mv "$file" "$APP_PATH/Contents/MacOS/AkademiTrack"
                  MAIN_EXEC="$APP_PATH/Contents/MacOS/AkademiTrack"
                  break
                fi
              done
            fi
            
            # Set executable permissions
            if [ -n "$MAIN_EXEC" ] && [ -f "$MAIN_EXEC" ]; then
              chmod +x "$MAIN_EXEC"
              echo "Set executable permissions for: $MAIN_EXEC"
            else
              echo "WARNING: Could not find main executable"
            fi
            
            # Set permissions for all files in MacOS directory
            chmod +x "$APP_PATH/Contents/MacOS"/* 2>/dev/null || true
            
            # Copy Python files to Resources if they exist
            for py_file in backend.py gui.py main.py; do
              if [ -f "$py_file" ]; then
                cp "$py_file" "$APP_PATH/Contents/Resources/" || true
              fi
            done
            
            # Copy pictures directory
            if [ -d "pictures" ]; then
              cp -r pictures "$APP_PATH/Contents/Resources/" || true
            fi
            
            # Create/fix Info.plist
            cat > "$APP_PATH/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>AkademiTrack</string>
              <key>CFBundleIdentifier</key>
              <string>com.akademitrack.app</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>AkademiTrack</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.14</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSRequiresAquaSystemAppearance</key>
              <false/>
          </dict>
          </plist>
          EOF
            
            echo "App bundle structure fixed successfully"
            echo "Final app contents:"
            ls -la "$APP_PATH/Contents/"
            echo "MacOS directory:"
            ls -la "$APP_PATH/Contents/MacOS/" || true
            echo "Resources directory:"
            ls -la "$APP_PATH/Contents/Resources/" || true
          else
            echo "ERROR: No app bundle found after build"
            echo "Available files and directories:"
            find . -name "*.app" -type d || echo "No .app directories found"
            ls -la dist/ || echo "No dist directory"
          fi
        shell: bash

      - name: Sign macOS app (ad-hoc)
        if: matrix.os == 'macos-latest'
        run: |
          if [ -d "dist/AkademiTrack.app" ]; then
            echo "Signing macOS app with ad-hoc signature..."
            
            # Remove any existing signatures
            codesign --remove-signature dist/AkademiTrack.app 2>/dev/null || true
            
            # Sign the app bundle with ad-hoc signature
            codesign --force --deep --sign - --options runtime dist/AkademiTrack.app
            
            # Verify the signature
            codesign --verify --verbose dist/AkademiTrack.app
            
            # Remove quarantine attribute
            xattr -cr dist/AkademiTrack.app 2>/dev/null || true
            
            echo "macOS app signed successfully"
          else
            echo "No app bundle found for signing"
            exit 1
          fi
        shell: bash

      - name: Test macOS app launch (basic check)
        if: matrix.os == 'macos-latest'
        run: |
          if [ -d "dist/AkademiTrack.app" ]; then
            echo "Testing app launch (basic executable check)..."
            
            # Check if the main executable exists and is executable
            if [ -x "dist/AkademiTrack.app/Contents/MacOS/AkademiTrack" ]; then
              echo "✅ Main executable is present and executable"
              
              # Try to get version info (this will fail but we can catch it)
              timeout 5s dist/AkademiTrack.app/Contents/MacOS/AkademiTrack --version 2>&1 || echo "App responded (expected to timeout)"
              
            else
              echo "❌ Main executable not found or not executable"
              ls -la dist/AkademiTrack.app/Contents/MacOS/
              exit 1
            fi
          else
            echo "❌ App bundle not found"
            exit 1
          fi
        shell: bash

      - name: Organize Windows build
        if: matrix.os == 'windows-latest'
        run: |
          echo "Organizing Windows build..."
          if [ -d "dist/main.dist" ]; then
            echo "Moving from dist/main.dist to dist/AkademiTrack"
            mv dist/main.dist dist/AkademiTrack
          elif [ -d "main.dist" ]; then
            echo "Moving from main.dist to dist/AkademiTrack"
            mkdir -p dist
            mv main.dist dist/AkademiTrack
          fi
          
          if [ -d "dist/AkademiTrack" ]; then
            echo "Windows build organized successfully"
            echo "Build size: $(du -sh dist/AkademiTrack)"
          else
            echo "ERROR: Windows build not found!"
          fi
        shell: bash

      - name: Organize Linux build
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Organizing Linux build..."
          if [ -d "dist/main.dist" ]; then
            echo "Moving from dist/main.dist to dist/AkademiTrack"
            mv dist/main.dist dist/AkademiTrack
          elif [ -d "main.dist" ]; then
            echo "Moving from main.dist to dist/AkademiTrack"
            mkdir -p dist
            mv main.dist dist/AkademiTrack
          fi
          
          if [ -d "dist/AkademiTrack" ]; then
            echo "Setting executable permissions"
            chmod +x dist/AkademiTrack/AkademiTrack
            echo "Linux build organized successfully"
            echo "Build size: $(du -sh dist/AkademiTrack)"
          else
            echo "ERROR: Linux build not found!"
          fi
        shell: bash

      - name: Create improved installer scripts
        run: |
          echo "Creating installer scripts..."
          
          # Windows installer
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cat > dist/install_akademitrack.bat << 'EOF'
          @echo off
          echo Installing AkademiTrack...
          set "INSTALL_DIR=%USERPROFILE%\AkademiTrack"

          if exist "%INSTALL_DIR%" (
              echo Removing existing installation...
              rmdir /s /q "%INSTALL_DIR%"
          )

          echo Creating installation directory...
          mkdir "%INSTALL_DIR%"

          echo Copying files...
          xcopy "AkademiTrack" "%INSTALL_DIR%" /E /I /Y

          echo Creating desktop shortcut...
          powershell -Command "$WshShell = New-Object -comObject WScript.Shell; $Shortcut = $WshShell.CreateShortcut('%USERPROFILE%\Desktop\AkademiTrack.lnk'); $Shortcut.TargetPath = '%INSTALL_DIR%\AkademiTrack.exe'; $Shortcut.Save()"

          echo.
          echo Installation complete!
          echo AkademiTrack installed to: %INSTALL_DIR%
          echo Desktop shortcut created!
          pause
          EOF
          fi
          
          # macOS installer
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            cat > dist/install_akademitrack.sh << 'EOF'
          #!/bin/bash
          echo "Installing AkademiTrack for macOS..."

          # Check if running with necessary permissions
          if [ ! -w "/Applications" ]; then
              echo "This installer needs permission to write to /Applications"
              echo "Please run with: sudo ./install_akademitrack.sh"
              echo "Or manually drag AkademiTrack.app to your Applications folder"
              exit 1
          fi

          if [ -d "/Applications/AkademiTrack.app" ]; then
              echo "Removing existing installation..."
              rm -rf "/Applications/AkademiTrack.app"
          fi

          echo "Copying AkademiTrack.app to Applications..."
          cp -R "AkademiTrack.app" "/Applications/"

          # Set proper permissions
          chmod +x "/Applications/AkademiTrack.app/Contents/MacOS/AkademiTrack"

          # Remove quarantine attribute
          xattr -cr "/Applications/AkademiTrack.app" 2>/dev/null || true

          echo ""
          echo "Installation complete!"
          echo ""
          echo "To run AkademiTrack:"
          echo "1. Open Applications folder (Cmd+Shift+A)"
          echo "2. Double-click AkademiTrack"
          echo "3. If macOS shows a security warning:"
          echo "   - Right-click AkademiTrack and select 'Open'"
          echo "   - Or go to System Preferences > Security & Privacy"
          echo "   - Click 'Open Anyway' next to the AkademiTrack message"
          echo ""
          echo "Alternative: Run directly from command line:"
          echo "open /Applications/AkademiTrack.app"
          EOF
            chmod +x dist/install_akademitrack.sh
          fi
          
          # Linux installer
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            cat > dist/install_akademitrack.sh << 'EOF'
          #!/bin/bash
          echo "Installing AkademiTrack for Linux..."
          INSTALL_DIR="$HOME/AkademiTrack"

          if [ -d "$INSTALL_DIR" ]; then
              echo "Removing existing installation..."
              rm -rf "$INSTALL_DIR"
          fi

          echo "Creating installation directory..."
          mkdir -p "$INSTALL_DIR"

          echo "Copying files..."
          cp -r AkademiTrack/* "$INSTALL_DIR/"
          chmod +x "$INSTALL_DIR/AkademiTrack"

          echo "Creating desktop entry..."
          mkdir -p ~/.local/share/applications
          cat > ~/.local/share/applications/akademitrack.desktop << 'DESKTOP_EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=AkademiTrack
          Comment=Academic tracking application
          Exec=INSTALL_DIR_PLACEHOLDER/AkademiTrack
          Icon=INSTALL_DIR_PLACEHOLDER/pictures/logo.png
          Terminal=false
          Categories=Education;Office;
          DESKTOP_EOF
          sed -i "s|INSTALL_DIR_PLACEHOLDER|$INSTALL_DIR|g" ~/.local/share/applications/akademitrack.desktop
          chmod +x ~/.local/share/applications/akademitrack.desktop

          echo ""
          echo "Installation complete!"
          echo "Desktop entry created!"
          echo ""
          echo "You can now:"
          echo "1. Find AkademiTrack in your application menu"
          echo "2. Run directly: $INSTALL_DIR/AkademiTrack"
          EOF
            chmod +x dist/install_akademitrack.sh
          fi
        shell: bash

      - name: Final verification and troubleshooting info
        run: |
          echo "=== Final Build Verification ==="
          echo "Dist directory contents:"
          ls -la dist/ || echo "No dist directory"
          echo ""
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            if [ -d "dist/AkademiTrack.app" ]; then
              echo "✅ macOS app bundle found"
              echo "App bundle structure:"
              echo "Contents directory:"
              ls -la dist/AkademiTrack.app/Contents/ || true
              echo "MacOS directory:"
              ls -la dist/AkademiTrack.app/Contents/MacOS/ || true
              echo "Resources directory:"
              ls -la dist/AkademiTrack.app/Contents/Resources/ || true
              echo ""
              echo "Executable permissions:"
              ls -la dist/AkademiTrack.app/Contents/MacOS/AkademiTrack || true
              echo ""
              echo "Code signature verification:"
              codesign -vv dist/AkademiTrack.app || true
            else
              echo "❌ macOS app bundle missing"
            fi
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            if [ -d "dist/AkademiTrack" ]; then
              echo "✅ Windows build found"
              echo "Windows build contents:"
              ls -la dist/AkademiTrack/ | head -10
            else
              echo "❌ Windows build missing"
            fi
          elif [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            if [ -d "dist/AkademiTrack" ]; then
              echo "✅ Linux build found"
              echo "Linux build contents:"
              ls -la dist/AkademiTrack/ | head -10
            else
              echo "❌ Linux build missing"
            fi
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AkademiTrack-${{ matrix.os }}
          path: |
            dist/
          if-no-files-found: error
          retention-days: 30

      - name: Create release assets (on main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "Preparing release assets..."
          cd dist
          if [ "${{ matrix.os }}" == "macos-latest" ] && [ -d "AkademiTrack.app" ]; then
            tar -czf ../AkademiTrack-macOS.tar.gz AkademiTrack.app install_akademitrack.sh
            echo "Created macOS release archive"
          elif [ "${{ matrix.os }}" == "windows-latest" ] && [ -d "AkademiTrack" ]; then
            zip -r ../AkademiTrack-Windows.zip AkademiTrack install_akademitrack.bat
            echo "Created Windows release archive"
          elif [ "${{ matrix.os }}" == "ubuntu-latest" ] && [ -d "AkademiTrack" ]; then
            tar -czf ../AkademiTrack-Linux.tar.gz AkademiTrack install_akademitrack.sh
            echo "Created Linux release archive"
          fi
        shell: bash

      - name: Upload release assets
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: AkademiTrack-Release-${{ matrix.os }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: ignore
