name: Build AkademiTrack
on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Don't cancel other jobs if one fails
      matrix:
        include:
          - os: windows-latest
            icon: pictures/logo.ico
            build-cmd: |
              nuitka --standalone --windows-console-mode=disable --enable-plugin=pyqt5 --include-data-dir=pictures=pictures --output-filename=AkademiTrack --output-dir=. --windows-icon-from-ico=pictures/logo.ico --assume-yes-for-downloads main.py
          - os: macos-latest
            icon: pictures/logo.icns
            build-cmd: |
              nuitka --mode=app --enable-plugin=pyqt5 --include-data-dir=pictures=pictures --output-filename=AkademiTrack --output-dir=. --macos-app-icon=pictures/logo.icns --assume-yes-for-downloads main.py
          - os: ubuntu-latest
            icon: pictures/logo.png
            build-cmd: |
              nuitka --standalone --enable-plugin=pyqt5 --include-data-dir=pictures=pictures --output-filename=AkademiTrack --output-dir=. --linux-icon=pictures/logo.png --assume-yes-for-downloads main.py

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-pyqt5

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka pyqt5
          pip install -r requirements.txt || echo "No requirements.txt found - continuing without it"

      - name: List files for debugging
        run: |
          echo 'Current directory contents:'
          ls -la
          echo 'Pictures directory contents:'
          ls -la pictures/
          echo 'Python files:'
          ls -la *.py

      - name: Test Python imports
        run: |
          echo "Testing Python imports..."
          python -c "import PyQt5; print('PyQt5 OK')"
          python -c "import sys; print('Python version:', sys.version)"
          python -c "exec(open('main.py').read().split('if __name__')[0]); print('main.py imports OK')" || echo "main.py import test failed"

      - name: Build application
        run: |
          echo "Building with command: ${{ matrix.build-cmd }}"
          ${{ matrix.build-cmd }}

      - name: Check build output size and contents
        run: |
          echo "=== Build Output Analysis ==="
          if [ -d "main.dist" ]; then
            echo "main.dist directory size:"
            du -sh main.dist/
            echo "main.dist contents:"
            ls -la main.dist/
            echo "Total files in main.dist:"
            find main.dist -type f | wc -l
          fi
          if [ -f "AkademiTrack.app" ] || [ -d "AkademiTrack.app" ]; then
            echo "AkademiTrack.app size:"
            du -sh AkademiTrack.app/
          fi
          if [ -f "AkademiTrack.exe" ]; then
            echo "AkademiTrack.exe size:"
            du -sh AkademiTrack.exe
          fi
          if [ -f "AkademiTrack" ]; then
            echo "AkademiTrack size:"
            du -sh AkademiTrack
          fi
        shell: bash

      - name: Move files from main.dist (Windows/Linux)
        if: matrix.os != 'macos-latest'
        run: |
          if [ -d "main.dist" ]; then
            echo "Moving files from main.dist to current directory"
            echo "Before move - current directory:"
            ls -la
            mv main.dist/* . || true
            rmdir main.dist || true
            echo "After move - current directory:"
            ls -la
          else
            echo "No main.dist directory found"
          fi
        shell: bash

      - name: List final build output
        run: |
          echo "=== Final Build Analysis ==="
          echo "Current directory total size:"
          du -sh .
          echo "All files:"
          ls -la
          echo "Looking for AkademiTrack files:"
          ls -la AkademiTrack* || echo "No AkademiTrack files found"
          echo "Executable files:"
          find . -type f -executable -name "*" | head -10
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AkademiTrack-${{ matrix.os }}
          path: |
            AkademiTrack*
            *.app/
            *.exe
            !*.xml
            !*.pyc
          if-no-files-found: error
