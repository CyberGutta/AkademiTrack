name: Build AkademiTrack
on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-cmd: |
              nuitka --standalone --windows-console-mode=disable --enable-plugin=pyqt5 --include-data-dir=pictures=pictures --include-module=backend --follow-imports --nofollow-import-to=tkinter --output-filename=AkademiTrack --output-dir=. --windows-icon-from-ico=pictures/logo.ico --assume-yes-for-downloads --jobs=2 --lto=no main.py
          - os: macos-latest
            build-cmd: |
              nuitka --standalone --enable-plugin=pyqt5 --include-data-dir=pictures=pictures --include-module=backend --follow-imports --nofollow-import-to=tkinter --output-filename=AkademiTrack --output-dir=. --assume-yes-for-downloads --jobs=2 --lto=no main.py
          - os: ubuntu-latest
            build-cmd: |
              nuitka --standalone --enable-plugin=pyqt5 --include-data-dir=pictures=pictures --include-module=backend --follow-imports --nofollow-import-to=tkinter --output-filename=AkademiTrack --output-dir=. --assume-yes-for-downloads --jobs=2 --lto=no main.py

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-pyqt5 libopengl0 || sudo apt-get install -y python3-dev python3-pyqt5 libgl1-mesa-glx

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka pyqt5 requests schedule browser-cookie3 psutil selenium webdriver-manager

      - name: Quick test
        run: |
          echo "Testing basic imports..."
          python -c "import PyQt5; print('PyQt5 OK')"
          python -c "import backend; print('backend OK')" || echo "backend failed"
          ls -la pictures/ || echo "no pictures"

      - name: Build application
        run: |
          echo "Starting build..."
          python -m ${{ matrix.build-cmd }}
          echo "Build finished"

      - name: Check what was built
        run: |
          echo "Contents after build:"
          ls -la
          
          # Look for any built files
          if [ -d "main.dist" ]; then
            echo "Found main.dist:"
            ls -la main.dist/
          fi
          
          if [ -f "AkademiTrack.app" ] || [ -d "AkademiTrack.app" ]; then
            echo "Found AkademiTrack.app"
          fi
          
          if [ -f "AkademiTrack.exe" ]; then
            echo "Found AkademiTrack.exe"
          fi
          
          if [ -f "AkademiTrack" ]; then
            echo "Found AkademiTrack executable"
          fi

      - name: Create simple installers
        run: |
          # Create a simple installer script for each platform
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo '@echo off' > install.bat
            echo 'echo Installing AkademiTrack...' >> install.bat
            echo 'mkdir "%USERPROFILE%\AkademiTrack"' >> install.bat
            echo 'xcopy /E /I "main.dist\*" "%USERPROFILE%\AkademiTrack\"' >> install.bat
            echo 'echo Done!' >> install.bat
            
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            echo '#!/bin/bash' > install.sh
            echo 'echo "Installing AkademiTrack..."' >> install.sh
            echo 'mkdir -p "$HOME/AkademiTrack"' >> install.sh
            echo 'cp -r main.dist/* "$HOME/AkademiTrack/"' >> install.sh
            echo 'chmod +x "$HOME/AkademiTrack/AkademiTrack"' >> install.sh
            echo 'echo "Done! Run: $HOME/AkademiTrack/AkademiTrack"' >> install.sh
            chmod +x install.sh
            
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            echo '#!/bin/bash' > install.sh
            echo 'echo "Installing AkademiTrack..."' >> install.sh
            echo 'mkdir -p "$HOME/AkademiTrack"' >> install.sh
            echo 'cp -r main.dist/* "$HOME/AkademiTrack/"' >> install.sh
            echo 'chmod +x "$HOME/AkademiTrack/AkademiTrack"' >> install.sh
            echo 'echo "Done! Run: $HOME/AkademiTrack/AkademiTrack"' >> install.sh
            chmod +x install.sh
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AkademiTrack-${{ matrix.os }}
          path: |
            main.dist/
            install.*
            AkademiTrack*
          if-no-files-found: warn
