name: Build AkademiTrack
on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            icon: pictures/logo.ico
            build-cmd: |
              nuitka --standalone --windows-console-mode=disable --enable-plugin=pyqt5 --include-data-dir=pictures=pictures --include-module=backend --include-module=gui --output-filename=AkademiTrack --output-dir=. --windows-icon-from-ico=pictures/logo.ico --assume-yes-for-downloads --follow-imports --nofollow-import-to=tkinter main.py
          - os: macos-latest
            icon: pictures/logo.icns
            build-cmd: |
              nuitka --mode=app --enable-plugin=pyqt5 --include-data-dir=pictures=pictures --include-module=backend --include-module=gui --output-filename=AkademiTrack --output-dir=. --macos-app-icon=pictures/logo.icns --assume-yes-for-downloads --macos-target-arch=arm64 --follow-imports main.py
          - os: ubuntu-latest
            icon: pictures/logo.png
            build-cmd: |
              nuitka --standalone --enable-plugin=pyqt5 --include-data-dir=pictures=pictures --include-module=backend --include-module=gui --output-filename=AkademiTrack --output-dir=. --linux-icon=pictures/logo.png --assume-yes-for-downloads --follow-imports main.py

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-pyqt5

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka pyqt5 requests selenium webdriver-manager schedule psutil browser-cookie3
        continue-on-error: false

      - name: Install additional macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          python -m pip install --upgrade setuptools wheel
          brew install --quiet python@3.11 || true
        continue-on-error: true

      - name: Verify Python modules before build
        run: |
          echo "Testing Python imports..."
          python -c "import PyQt5; print('PyQt5 OK')"
          python -c "import backend; print('backend.py OK')" || echo "backend.py import failed"
          python -c "import gui; print('gui.py OK')" || echo "gui.py import failed"
          python -c "import main; print('main.py OK')" || echo "main.py import failed"
          echo "Files in current directory:"
          ls -la *.py
        shell: bash

      - name: Build application
        run: |
          echo "Building with command: ${{ matrix.build-cmd }}"
          python -m ${{ matrix.build-cmd }}
        shell: bash

      - name: Fix macOS bundle structure
        if: matrix.os == 'macos-latest'
        run: |
          if [ -d "AkademiTrack.app" ]; then
            echo "Copying Python modules into app bundle..."
            
            # Copy the Python files to Resources so they're accessible
            cp backend.py AkademiTrack.app/Contents/Resources/ || echo "Could not copy backend.py"
            cp gui.py AkademiTrack.app/Contents/Resources/ || echo "Could not copy gui.py"
            
            # Also copy to MacOS directory for imports
            cp backend.py AkademiTrack.app/Contents/MacOS/ || echo "Could not copy backend.py to MacOS"
            cp gui.py AkademiTrack.app/Contents/MacOS/ || echo "Could not copy gui.py to MacOS"
            
            echo "Files now in Resources:"
            ls -la AkademiTrack.app/Contents/Resources/
            echo "Files now in MacOS:"
            ls -la AkademiTrack.app/Contents/MacOS/
            
            # Set executable permissions
            chmod +x AkademiTrack.app/Contents/MacOS/AkademiTrack
            
            echo "Bundle structure fixed"
          else
            echo "No AkademiTrack.app found"
          fi

      - name: Sign macOS app and create installer
        if: matrix.os == 'macos-latest'
        run: |
          if [ -d "AkademiTrack.app" ]; then
            echo "Creating ad-hoc signature for AkademiTrack.app"
            
            # Remove any existing signature first
            codesign --remove-signature AkademiTrack.app 2>/dev/null || true
            
            # Sign with ad-hoc signature
            codesign --force --deep --sign - AkademiTrack.app
            codesign --verify --verbose AkademiTrack.app
            echo "Ad-hoc signature applied successfully"
            
            # Remove quarantine attribute
            xattr -d com.apple.quarantine AkademiTrack.app 2>/dev/null || true
            
            # Create installer script
            cat > install_akademitrack.sh << 'INSTALLER_EOF'
          #!/bin/bash
          echo "Installing AkademiTrack (Universal Binary for Intel & Apple Silicon)..."
          echo ""
          
          if [ -d "/Applications/AkademiTrack.app" ]; then
              echo "Removing existing installation..."
              rm -rf "/Applications/AkademiTrack.app"
          fi
          echo "Copying AkademiTrack.app to Applications folder..."
          cp -R "AkademiTrack.app" "/Applications/"
          
          # Remove quarantine attribute from installed app
          xattr -d com.apple.quarantine "/Applications/AkademiTrack.app" 2>/dev/null || true
          
          echo "Installation complete!"
          echo ""
          echo "To run AkademiTrack:"
          echo "1. Open Applications folder"
          echo "2. Double-click AkademiTrack"
          echo "3. If macOS shows security warning, right-click and select 'Open'"
          echo "4. Click 'Open' when asked for confirmation"
          echo ""
          echo "This is a Universal Binary that works on both Intel and Apple Silicon Macs"
          INSTALLER_EOF
            chmod +x install_akademitrack.sh
            echo "Created installer script"
          else
            echo "No AkademiTrack.app found for signing"
          fi
        shell: bash

      - name: Create Windows installer script
        if: matrix.os == 'windows-latest'
        run: |
          cat > install_akademitrack.bat << 'INSTALLER_EOF'
          @echo off
          echo Installing AkademiTrack...
          set "INSTALL_DIR=%USERPROFILE%\AkademiTrack"
          if exist "%INSTALL_DIR%" (
              echo Removing existing installation...
              rmdir /s /q "%INSTALL_DIR%"
          )
          echo Creating installation directory...
          mkdir "%INSTALL_DIR%"
          echo Copying files...
          xcopy "AkademiTrack" "%INSTALL_DIR%" /E /I /Y
          echo.
          echo Installation complete!
          echo AkademiTrack installed to: %INSTALL_DIR%
          echo.
          echo Creating desktop shortcut...
          powershell -Command "$WshShell = New-Object -comObject WScript.Shell; $Shortcut = $WshShell.CreateShortcut('%USERPROFILE%\Desktop\AkademiTrack.lnk'); $Shortcut.TargetPath = '%INSTALL_DIR%\AkademiTrack.exe'; $Shortcut.Save()"
          echo Desktop shortcut created!
          pause
          INSTALLER_EOF
          echo "Created Windows installer script"
        shell: bash

      - name: Create Linux installer script
        if: matrix.os == 'ubuntu-latest'
        run: |
          cat > install_akademitrack.sh << 'INSTALLER_EOF'
          #!/bin/bash
          echo "Installing AkademiTrack..."
          INSTALL_DIR="$HOME/AkademiTrack"
          if [ -d "$INSTALL_DIR" ]; then
              echo "Removing existing installation..."
              rm -rf "$INSTALL_DIR"
          fi
          echo "Creating installation directory..."
          mkdir -p "$INSTALL_DIR"
          echo "Copying files..."
          cp AkademiTrack "$INSTALL_DIR/"
          cp -r pictures "$INSTALL_DIR/" 2>/dev/null || true
          chmod +x "$INSTALL_DIR/AkademiTrack"
          echo ""
          echo "Installation complete!"
          echo ""
          echo "Creating desktop entry..."
          mkdir -p ~/.local/share/applications
          cat > ~/.local/share/applications/akademitrack.desktop << 'DESKTOP_EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=AkademiTrack
          Comment=Academic tracking application
          Exec=INSTALL_DIR_PLACEHOLDER/AkademiTrack
          Icon=INSTALL_DIR_PLACEHOLDER/pictures/logo.png
          Terminal=false
          Categories=Education;Office;
          DESKTOP_EOF
          sed -i "s|INSTALL_DIR_PLACEHOLDER|$INSTALL_DIR|g" ~/.local/share/applications/akademitrack.desktop
          chmod +x ~/.local/share/applications/akademitrack.desktop
          echo "Desktop entry created!"
          INSTALLER_EOF
          chmod +x install_akademitrack.sh
          echo "Created Linux installer script"
        shell: bash

      - name: Restructure Windows build
        if: matrix.os == 'windows-latest'
        run: |
          if [ -d "main.dist" ]; then
            echo "Creating AkademiTrack directory and moving files from main.dist"
            mkdir -p AkademiTrack
            mv main.dist/* AkademiTrack/ || cp -r main.dist/* AkademiTrack/
            rm -rf main.dist
            echo "AkademiTrack directory created with size:"
            du -sh AkademiTrack/
          fi
        shell: bash

      - name: Move files from main.dist (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ -d "main.dist" ]; then
            echo "Moving files from main.dist to current directory"
            mv main.dist/* . || true
            rmdir main.dist || true
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AkademiTrack-${{ matrix.os }}
          path: |
            AkademiTrack/
            AkademiTrack*
            *.exe
            *.sh
            *.bat
            !*.xml
            !*.pyc
            !main.build/
          if-no-files-found: warn
