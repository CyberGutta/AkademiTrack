name: Build AkademiTrack
on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            icon: pictures/logo.ico
            executable: AkademiTrack.exe
            build-cmd: |
              nuitka --standalone \
                --windows-console-mode=disable \
                --enable-plugin=pyqt5 \
                --include-data-dir=pictures=pictures \
                --include-module=backend \
                --include-package=PyQt5 \
                --include-package=PyQt5.QtCore \
                --include-package=PyQt5.QtGui \
                --include-package=PyQt5.QtWidgets \
                --follow-imports \
                --nofollow-import-to=tkinter \
                --output-filename=AkademiTrack \
                --output-dir=. \
                --windows-icon-from-ico=pictures/logo.ico \
                --assume-yes-for-downloads \
                --show-progress \
                --verbose \
                main.py
          - os: macos-latest
            icon: pictures/logo.icns
            executable: AkademiTrack.app
            build-cmd: |
              nuitka --mode=app \
                --enable-plugin=pyqt5 \
                --include-data-dir=pictures=pictures \
                --include-module=backend \
                --include-package=PyQt5 \
                --include-package=PyQt5.QtCore \
                --include-package=PyQt5.QtGui \
                --include-package=PyQt5.QtWidgets \
                --follow-imports \
                --nofollow-import-to=tkinter \
                --output-filename=AkademiTrack \
                --output-dir=. \
                --macos-app-icon=pictures/logo.icns \
                --macos-target-arch=arm64 \
                --assume-yes-for-downloads \
                --show-progress \
                --verbose \
                main.py
          - os: ubuntu-latest
            icon: pictures/logo.png
            executable: AkademiTrack
            build-cmd: |
              nuitka --standalone \
                --enable-plugin=pyqt5 \
                --include-data-dir=pictures=pictures \
                --include-module=backend \
                --include-package=PyQt5 \
                --include-package=PyQt5.QtCore \
                --include-package=PyQt5.QtGui \
                --include-package=PyQt5.QtWidgets \
                --follow-imports \
                --nofollow-import-to=tkinter \
                --output-filename=AkademiTrack \
                --output-dir=. \
                --linux-icon=pictures/logo.png \
                --assume-yes-for-downloads \
                --show-progress \
                --verbose \
                main.py

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-pyqt5 libgl1-mesa-glx || sudo apt-get install -y python3-dev python3-pyqt5 libopengl0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka pyqt5 setuptools wheel requests schedule browser-cookie3 psutil selenium webdriver-manager
        continue-on-error: false

      - name: Install additional macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          python -m pip install --upgrade setuptools wheel
          brew install --quiet python@3.11 || true
        continue-on-error: true

      - name: Verify project structure
        run: |
          echo "=== Project Structure Verification ==="
          echo "Current directory contents:"
          ls -la
          echo "Python files:"
          ls -la *.py
          echo "Pictures directory:"
          ls -la pictures/ || echo "Pictures directory not found"
          echo "Required files check:"
          [ -f "main.py" ] && echo "main.py exists" || echo "main.py missing"
          [ -f "backend.py" ] && echo "backend.py exists" || echo "backend.py missing"
          [ -f "pictures/${{ matrix.icon }}" ] && echo "Icon file exists" || echo "Icon file missing"
        shell: bash

      - name: Test Python imports and modules
        run: |
          echo "=== Python Import Testing ==="
          python -c "import sys; print('Python version:', sys.version)"
          python -c "import PyQt5; print('PyQt5 OK')" || echo "PyQt5 import failed"
          python -c "import PyQt5.QtWidgets; print('PyQt5.QtWidgets OK')" || echo "PyQt5.QtWidgets import failed"
          
          if [ -f "backend.py" ]; then
            python -c "import backend; print('backend.py OK')" || echo "backend.py import failed"
          fi
          
          echo "Testing main.py imports..."
          python -c "
          import sys
          import os
          
          # Set __file__ for proper execution context
          __file__ = 'main.py'
          
          with open('main.py', 'r') as f:
              content = f.read()
          
          imports_section = content.split('if __name__')[0]
          
          try:
              exec(imports_section, {'__file__': __file__})
              print('main.py imports OK')
          except Exception as e:
              print(f'main.py import error: {e}')
          " || echo "main.py import test failed"
        shell: bash

      - name: Build application
        run: |
          echo "=== Building Application ==="
          echo "Build command: ${{ matrix.build-cmd }}"
          echo "Starting build process..."
          
          python -m ${{ matrix.build-cmd }}
          
          echo "Build process completed"
        shell: bash

      - name: Verify build output
        run: |
          echo "=== Build Output Verification ==="
          echo "Current directory after build:"
          ls -la
          
          if [ -d "main.dist" ]; then
            echo "main.dist directory found"
            echo "main.dist size: $(du -sh main.dist/ 2>/dev/null || echo 'unknown')"
            echo "main.dist contents:"
            ls -la main.dist/
            echo "Total files in main.dist: $(find main.dist -type f | wc -l)"
          else
            echo "No main.dist directory found"
          fi
          
          if [ -d "${{ matrix.executable }}" ] || [ -f "${{ matrix.executable }}" ]; then
            echo "${{ matrix.executable }} found"
            echo "${{ matrix.executable }} size: $(du -sh ${{ matrix.executable }} 2>/dev/null || echo 'unknown')"
          else
            echo "${{ matrix.executable }} not found in current directory"
          fi
        shell: bash

      - name: Test macOS app execution and dependencies
        if: matrix.os == 'macos-latest'
        run: |
          if [ -d "AkademiTrack.app" ]; then
            echo "=== macOS App Testing ==="
            echo "App bundle structure:"
            find AkademiTrack.app -type f | head -20
            
            echo "Checking executable permissions:"
            ls -la AkademiTrack.app/Contents/MacOS/AkademiTrack
            
            echo "Checking shared library dependencies:"
            otool -L AkademiTrack.app/Contents/MacOS/AkademiTrack 2>/dev/null || echo "Could not check dependencies"
            
            echo "Testing app execution (5-second timeout):"
            timeout 5s ./AkademiTrack.app/Contents/MacOS/AkademiTrack > app_test.log 2>&1 || true
            
            echo "App execution log:"
            cat app_test.log || echo "No execution log generated"
            
            echo "Checking for Python modules in Resources:"
            ls -la AkademiTrack.app/Contents/Resources/ | grep -E "\.py|\.so|\.dylib" || echo "No Python files found in Resources"
          else
            echo "No AkademiTrack.app found for testing"
          fi
        shell: bash

      - name: Sign macOS app and create installer
        if: matrix.os == 'macos-latest'
        run: |
          if [ -d "AkademiTrack.app" ]; then
            echo "=== macOS App Signing ==="
            
            echo "Checking app architecture:"
            file AkademiTrack.app/Contents/MacOS/AkademiTrack 2>/dev/null || echo "Could not check file type"
            lipo -archs AkademiTrack.app/Contents/MacOS/AkademiTrack 2>/dev/null || echo "Could not check architecture with lipo"
            
            echo "Applying ad-hoc signature..."
            codesign --remove-signature AkademiTrack.app 2>/dev/null || true
            codesign --force --deep --sign - AkademiTrack.app
            
            codesign --verify --verbose AkademiTrack.app && echo "Signature verified" || echo "Signature verification failed"
            
            xattr -d com.apple.quarantine AkademiTrack.app 2>/dev/null || echo "No quarantine attribute to remove"
            
            cat > install_akademitrack.sh << 'EOF'
          #!/bin/bash
          echo "=== AkademiTrack Installer for Apple Silicon Macs ==="
          echo "This app is built specifically for M1, M2, M3, M4 Macs (Apple Silicon)"
          echo ""
          
          if [[ $(uname -m) != "arm64" ]]; then
              echo "WARNING: This version is built for Apple Silicon (M1/M2/M3/M4) Macs only."
              echo "If you're on an Intel Mac, this may not work properly."
              echo "Press Ctrl+C to cancel or Enter to continue..."
              read
          fi
          
          if [ -d "/Applications/AkademiTrack.app" ]; then
              echo "Removing existing installation..."
              rm -rf "/Applications/AkademiTrack.app"
          fi
          
          echo "Installing AkademiTrack to Applications folder..."
          cp -R "AkademiTrack.app" "/Applications/"
          
          chmod -R 755 "/Applications/AkademiTrack.app"
          
          echo "Installation complete!"
          echo ""
          echo "To run AkademiTrack:"
          echo "1. Open Applications folder"
          echo "2. Right-click on AkademiTrack and select 'Open'"
          echo "3. Click 'Open' when macOS asks for confirmation (first run only)"
          echo "4. After first run, you can open normally from Launchpad"
          echo ""
          echo "Note: This is an Apple Silicon (ARM64) build for M1/M2/M3/M4 Macs"
          EOF
            
            chmod +x install_akademitrack.sh
            echo "Installer script created"
          else
            echo "No AkademiTrack.app found for signing"
          fi
        shell: bash

      - name: Create Windows installer script
        if: matrix.os == 'windows-latest'
        run: |
          cat > install_akademitrack.bat << 'EOF'
          @echo off
          echo === AkademiTrack Windows Installer ===
          echo.
          
          set "INSTALL_DIR=%USERPROFILE%\AkademiTrack"
          
          if exist "%INSTALL_DIR%" (
              echo Removing existing installation...
              rmdir /s /q "%INSTALL_DIR%"
          )
          
          echo Creating installation directory...
          mkdir "%INSTALL_DIR%"
          
          echo Copying application files...
          if exist "main.dist" (
              xcopy "main.dist\*" "%INSTALL_DIR%" /E /I /Y
          ) else if exist "AkademiTrack" (
              xcopy "AkademiTrack\*" "%INSTALL_DIR%" /E /I /Y
          ) else (
              echo Error: Could not find application files to install
              pause
              exit /b 1
          )
          
          echo.
          echo Installation complete!
          echo AkademiTrack installed to: %INSTALL_DIR%
          echo.
          echo To run AkademiTrack:
          echo 1. Navigate to %INSTALL_DIR% and double-click AkademiTrack.exe
          echo.
          pause
          EOF
          echo "Windows installer script created"
        shell: bash

      - name: Create Linux installer script
        if: matrix.os == 'ubuntu-latest'
        run: |
          cat > install_akademitrack.sh << 'EOF'
          #!/bin/bash
          echo "=== AkademiTrack Linux Installer ==="
          echo ""
          
          INSTALL_DIR="$HOME/AkademiTrack"
          
          if [ -d "$INSTALL_DIR" ]; then
              echo "Removing existing installation..."
              rm -rf "$INSTALL_DIR"
          fi
          
          echo "Creating installation directory..."
          mkdir -p "$INSTALL_DIR"
          
          echo "Copying application files..."
          if [ -d "main.dist" ]; then
              cp -r main.dist/* "$INSTALL_DIR/"
          elif [ -f "AkademiTrack" ]; then
              cp "AkademiTrack" "$INSTALL_DIR/"
          else
              echo "Error: Could not find application files to install"
              exit 1
          fi
          
          cp -r pictures "$INSTALL_DIR/" 2>/dev/null || echo "No pictures directory to copy"
          
          chmod +x "$INSTALL_DIR/AkademiTrack" 2>/dev/null || echo "Could not set executable permissions"
          
          echo ""
          echo "Installation complete!"
          echo "AkademiTrack installed to: $INSTALL_DIR"
          echo ""
          
          echo "Creating desktop entry..."
          mkdir -p ~/.local/share/applications
          cat > ~/.local/share/applications/akademitrack.desktop << 'DESKTOP_EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=AkademiTrack
          Comment=Academic tracking application
          Exec=INSTALL_DIR_PLACEHOLDER/AkademiTrack
          Icon=INSTALL_DIR_PLACEHOLDER/pictures/logo.png
          Terminal=false
          Categories=Education;Office;
          DESKTOP_EOF
          
          sed -i "s|INSTALL_DIR_PLACEHOLDER|$INSTALL_DIR|g" ~/.local/share/applications/akademitrack.desktop
          chmod +x ~/.local/share/applications/akademitrack.desktop
          
          echo "Desktop entry created!"
          echo ""
          echo "To run AkademiTrack:"
          echo "1. Search for 'AkademiTrack' in your application menu, OR"
          echo "2. Run: cd $INSTALL_DIR && ./AkademiTrack"
          echo ""
          EOF
          chmod +x install_akademitrack.sh
          echo "Linux installer script created"
        shell: bash

      - name: Restructure build outputs
        run: |
          echo "=== Restructuring Build Outputs ==="
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            if [ -d "main.dist" ]; then
              echo "Restructuring Windows build..."
              mkdir -p AkademiTrack
              echo "Moving files from main.dist to AkademiTrack/"
              mv main.dist/* AkademiTrack/ 2>/dev/null || cp -r main.dist/* AkademiTrack/
              rm -rf main.dist
              echo "Windows build restructured"
            fi
            
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            if [ -d "main.dist" ]; then
              echo "Restructuring Linux build..."
              echo "Moving executable from main.dist to current directory"
              mv main.dist/AkademiTrack . 2>/dev/null || cp main.dist/AkademiTrack .
              echo "Linux build restructured"
            fi
          fi
        shell: bash

      - name: Final build verification
        run: |
          echo "=== Final Build Verification ==="
          echo "Current directory contents:"
          ls -la
          
          echo "Checking for expected outputs:"
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            [ -d "AkademiTrack.app" ] && echo "AkademiTrack.app found" || echo "AkademiTrack.app missing"
            [ -f "install_akademitrack.sh" ] && echo "macOS installer found" || echo "macOS installer missing"
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            [ -d "AkademiTrack" ] && echo "AkademiTrack directory found" || echo "AkademiTrack directory missing"
            [ -f "install_akademitrack.bat" ] && echo "Windows installer found" || echo "Windows installer missing"
            if [ -d "AkademiTrack" ]; then
              echo "AkademiTrack directory contents:"
              ls -la AkademiTrack/ | head -10
              echo "AkademiTrack directory size: $(du -sh AkademiTrack/ 2>/dev/null || echo 'unknown')"
            fi
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            [ -f "AkademiTrack" ] && echo "AkademiTrack executable found" || echo "AkademiTrack executable missing"
            [ -f "install_akademitrack.sh" ] && echo "Linux installer found" || echo "Linux installer missing"
            [ -d "main.dist" ] && echo "main.dist directory available" || echo "main.dist not available"
          fi
          
          echo "Directory total size: $(du -sh . 2>/dev/null || echo 'unknown')"
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AkademiTrack-${{ matrix.os }}
          path: |
            AkademiTrack.app/
            AkademiTrack/
            AkademiTrack
            main.dist/
            install_akademitrack.sh
            install_akademitrack.bat
            app_test.log
          if-no-files-found: warn
          retention-days: 30
